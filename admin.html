<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - المكتبة العامة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            padding-top: 0;
            background: var(--bg-primary);
            min-height: 100vh;
        }

        .admin-wrapper {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* شريط التنقل */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .admin-header h1 {
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
        }

        .admin-header h1 i {
            font-size: 2rem;
        }

        .admin-actions {
            display: flex;
            gap: 10px;
        }

        .btn-back, .btn-preview {
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .btn-back {
            background: #4b5563;
            color: white;
        }

        .btn-back:hover {
            background: #6b7280;
        }

        .btn-preview {
            background: var(--accent);
            color: white;
        }

        .btn-preview:hover {
            background: var(--accent-hover);
        }

        /* بطاقة إضافة كتاب */
        .add-book-card {
            background: var(--bg-secondary);
            border-radius: var(--border-radius);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid #374151;
        }

        .add-book-card h2 {
            color: var(--accent);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
        }

        .form-group {
            margin-bottom: 0;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.8rem 1rem;
            border: none;
            border-radius: 12px;
            background: #1e293b;
            color: white;
            font-family: inherit;
            border: 1px solid #374151;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .btn-submit {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            margin-top: 1rem;
        }

        .btn-submit:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }

        /* إحصائيات سريعة */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            border: 1px solid #374151;
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }

        .stat-content h3 {
            font-size: 1.8rem;
            line-height: 1.2;
        }

        .stat-content p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* جدول الكتب */
        .books-table-card {
            background: var(--bg-secondary);
            border-radius: var(--border-radius);
            padding: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid #374151;
            overflow-x: auto;
        }

        .books-table-card h2 {
            color: var(--accent);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            text-align: right;
            padding: 1rem 0.5rem;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 2px solid #374151;
        }

        td {
            padding: 1rem 0.5rem;
            border-bottom: 1px solid #1e293b;
            vertical-align: middle;
        }

        .book-image {
            width: 50px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
        }

        .book-title {
            font-weight: 500;
        }

        .book-author {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .subject-badge {
            background: #1e293b;
            color: white;
            font-size: 0.8rem;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            display: inline-block;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        .btn-edit, .btn-delete {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            color: white;
        }

        .btn-edit {
            background: #f59e0b;
        }

        .btn-edit:hover {
            background: #d97706;
        }

        .btn-delete {
            background: #dc2626;
        }

        .btn-delete:hover {
            background: #b91c1c;
        }

        .no-books-message {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        /* رسائل التنبيه */
        .alert {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-success {
            background: #10b98120;
            border: 1px solid #10b981;
            color: #10b981;
        }

        .alert-error {
            background: #ef444420;
            border: 1px solid #ef4444;
            color: #ef4444;
        }

        /* نافذة التعديل المنبثقة */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: var(--border-radius);
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            border: 1px solid #374151;
            position: relative;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            color: var(--accent);
        }

        .close-modal {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .close-modal:hover {
            color: white;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .admin-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        <!-- رأس الصفحة -->
        <div class="admin-header">
            <h1><i class="fas fa-crown"></i> لوحة إدارة المكتبة</h1>
            <div class="admin-actions">
                <a href="index.html" class="btn-back"><i class="fas fa-arrow-right"></i> العودة للمكتبة</a>
                <a href="index.html" target="_blank" class="btn-preview"><i class="fas fa-eye"></i> معاينة الموقع</a>
            </div>
        </div>

        <!-- إحصائيات سريعة -->
        <div class="stats-grid" id="stats-container">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-book"></i></div>
                <div class="stat-content">
                    <h3 id="total-books">0</h3>
                    <p>إجمالي الكتب</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-tags"></i></div>
                <div class="stat-content">
                    <h3 id="total-categories">0</h3>
                    <p>التصنيفات</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-users"></i></div>
                <div class="stat-content">
                    <h3 id="total-users">0</h3>
                    <p>المستخدمين</p>
                </div>
            </div>
        </div>

        <!-- بطاقة إضافة كتاب -->
        <div class="add-book-card">
            <h2><i class="fas fa-plus-circle"></i> إضافة كتاب جديد</h2>
            <form id="book-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label>عنوان الكتاب</label>
                        <input type="text" id="title" placeholder="مثال: الأيام" required>
                    </div>
                    <div class="form-group">
                        <label>المؤلف</label>
                        <input type="text" id="author" placeholder="مثال: طه حسين" required>
                    </div>
                    <div class="form-group">
                        <label>التصنيف</label>
                        <select id="subject" required>
                            <option value="stories">قصص</option>
                            <option value="novels">روايات</option>
                            <option value="religious">دينية</option>
                            <option value="science">علمية</option>
                            <option value="history">تاريخية</option>
                            <option value="self-dev">تنمية بشرية</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>رابط صورة الغلاف</label>
                        <input type="url" id="image" placeholder="https://example.com/image.jpg" required>
                    </div>
                    <div class="form-group full-width">
                        <label>رابط ملف PDF</label>
                        <input type="url" id="pdf" placeholder="https://example.com/book.pdf" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit"><i class="fas fa-save"></i> حفظ الكتاب</button>
            </form>
            <div id="form-message"></div>
        </div>

        <!-- قائمة الكتب -->
        <div class="books-table-card">
            <h2><i class="fas fa-list"></i> الكتب الموجودة</h2>
            <div class="table-container">
                <table id="books-table">
                    <thead>
                        <tr>
                            <th>الغلاف</th>
                            <th>العنوان</th>
                            <th>المؤلف</th>
                            <th>التصنيف</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="books-list">
                        <!-- تعبأ بواسطة JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- نافذة تعديل الكتاب -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> تعديل الكتاب</h3>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>
            <form id="edit-form">
                <input type="hidden" id="edit-index">
                <div class="form-group">
                    <label>عنوان الكتاب</label>
                    <input type="text" id="edit-title" required>
                </div>
                <div class="form-group">
                    <label>المؤلف</label>
                    <input type="text" id="edit-author" required>
                </div>
                <div class="form-group">
                    <label>التصنيف</label>
                    <select id="edit-subject" required>
                        <option value="stories">قصص</option>
                        <option value="novels">روايات</option>
                        <option value="religious">دينية</option>
                        <option value="science">علمية</option>
                        <option value="history">تاريخية</option>
                        <option value="self-dev">تنمية بشرية</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>رابط صورة الغلاف</label>
                    <input type="url" id="edit-image" required>
                </div>
                <div class="form-group">
                    <label>رابط ملف PDF</label>
                    <input type="url" id="edit-pdf" required>
                </div>
                <button type="submit" class="btn-submit"><i class="fas fa-save"></i> تحديث الكتاب</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>

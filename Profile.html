<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملفي الشخصي - المكتبة العامة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            padding-top: 0;
            background: var(--bg-primary);
        }
        .profile-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .profile-header {
            background: var(--bg-secondary);
            border-radius: var(--border-radius);
            padding: 2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
            box-shadow: var(--shadow);
            border: 1px solid #374151;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
        }
        .profile-info h2 {
            font-size: 1.8rem;
            margin-bottom: 0.3rem;
        }
        .profile-info p {
            color: var(--text-muted);
            margin-bottom: 0.2rem;
        }
        .profile-stats {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .profile-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .section-card {
            background: var(--bg-secondary);
            border-radius: var(--border-radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid #374151;
        }
        .section-card h3 {
            color: var(--accent);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .preference-item {
            margin-bottom: 1.5rem;
        }
        .preference-item label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }
        .preference-item select,
        .preference-item input[type="range"] {
            width: 100%;
            padding: 0.6rem;
            border-radius: 8px;
            background: #1e293b;
            border: 1px solid #374151;
            color: white;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            color: white;
        }
        .save-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: var(--transition);
        }
        .save-btn:hover {
            background: var(--accent-hover);
        }
        .book-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .book-list-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.5rem;
            background: #1e293b;
            border-radius: 8px;
        }
        .book-list-item img {
            width: 50px;
            height: 50px;
            border-radius: 6px;
            object-fit: cover;
        }
        .book-list-item .info {
            flex: 1;
        }
        .book-list-item .info h4 {
            font-size: 1rem;
        }
        .book-list-item .info p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .remove-fav {
            background: #dc2626;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--text-muted);
            text-decoration: none;
        }
        .back-link:hover {
            color: var(--accent);
        }
        @media (max-width: 768px) {
            .profile-sections {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للمكتبة</a>
        
        <div class="profile-header">
            <img src="" alt="Avatar" class="profile-avatar" id="profile-avatar">
            <div class="profile-info">
                <h2 id="profile-name"></h2>
                <p id="profile-email"></p>
                <p>تاريخ الانضمام: <span id="profile-joined"></span></p>
                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-number" id="stat-books">0</div>
                        <div class="stat-label">كتب مقروءة</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="stat-fav">0</div>
                        <div class="stat-label">مفضلة</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="stat-current">0</div>
                        <div class="stat-label">قيد القراءة</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="profile-sections">
            <!-- إعدادات التفضيلات -->
            <div class="section-card">
                <h3><i class="fas fa-sliders-h"></i> تفضيلات القراءة</h3>
                <form id="preferences-form">
                    <div class="preference-item">
                        <label>التصنيفات المفضلة</label>
                        <div class="checkbox-group" id="fav-subjects">
                            <!-- يتم تعبئتها بواسطة JS -->
                        </div>
                    </div>
                    <div class="preference-item">
                        <label>حجم الخط</label>
                        <select id="font-size">
                            <option value="small">صغير</option>
                            <option value="medium">متوسط</option>
                            <option value="large">كبير</option>
                        </select>
                    </div>
                    <div class="preference-item">
                        <label>الوضع الليلي</label>
                        <select id="dark-mode">
                            <option value="false">غير مفعل</option>
                            <option value="true">مفعل</option>
                        </select>
                    </div>
                    <div class="preference-item">
                        <label>الهدف الشهري (عدد الكتب)</label>
                        <input type="range" id="reading-goal" min="0" max="20" step="1">
                        <span id="goal-value">0</span>
                    </div>
                    <button type="submit" class="save-btn">حفظ التغييرات</button>
                </form>
            </div>

            <!-- الكتب المفضلة -->
            <div class="section-card">
                <h3><i class="fas fa-heart" style="color: #fbbf24;"></i> الكتب المفضلة</h3>
                <div id="favorites-list" class="book-list">
                    <!-- تعبأ بواسطة JS -->
                </div>
            </div>

            <!-- آخر الكتب المقروءة -->
            <div class="section-card">
                <h3><i class="fas fa-history"></i> آخر الكتب المقروءة</h3>
                <div id="recent-list" class="book-list">
                    <!-- تعبأ بواسطة JS -->
                </div>
            </div>

            <!-- الكتب قيد القراءة (يمكن إضافتها لاحقاً) -->
            <div class="section-card">
                <h3><i class="fas fa-bookmark"></i> قيد القراءة</h3>
                <div id="current-list" class="book-list">
                    <!-- تعبأ بواسطة JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // تحميل المستخدم الحالي
        let currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser) {
            window.location.href = 'login.html';
        }

        // قائمة التصنيفات (للاستخدام في checkbox)
        const subjects = [
            { id: "stories", name: "قصص", icon: "fa-solid fa-book" },
            { id: "novels", name: "روايات", icon: "fa-solid fa-book-open" },
            { id: "religious", name: "دينية", icon: "fa-solid fa-mosque" },
            { id: "science", name: "علمية", icon: "fa-solid fa-flask" },
            { id: "history", name: "تاريخية", icon: "fa-solid fa-landmark" },
            { id: "self-dev", name: "تنمية بشرية", icon: "fa-solid fa-brain" }
        ];

        // دالة لحفظ المستخدمين
        function saveUsers(users) {
            localStorage.setItem('users', JSON.stringify(users));
        }

        // دالة لتحديث المستخدم الحالي في localStorage
        function updateCurrentUser(updatedUser) {
            let users = JSON.parse(localStorage.getItem('users')) || [];
            const index = users.findIndex(u => u.id === updatedUser.id);
            if (index !== -1) {
                users[index] = updatedUser;
                saveUsers(users);
                localStorage.setItem('currentUser', JSON.stringify(updatedUser));
                currentUser = updatedUser;
            }
        }

        // عرض معلومات الملف الشخصي
        function renderProfile() {
            document.getElementById('profile-avatar').src = currentUser.avatar || 'https://via.placeholder.com/100x100?text=User';
            document.getElementById('profile-name').innerText = currentUser.name || 'مستخدم';
            document.getElementById('profile-email').innerText = currentUser.email;
            document.getElementById('profile-joined').innerText = new Date(currentUser.createdAt).toLocaleDateString('ar-EG');
            
            const stats = currentUser.stats || {};
            document.getElementById('stat-books').innerText = stats.booksRead || 0;
            document.getElementById('stat-fav').innerText = (stats.favoriteBooks || []).length;
            document.getElementById('stat-current').innerText = (stats.currentlyReading || []).length;
        }

        // عرض التصنيفات المفضلة (checkbox)
        function renderFavoriteSubjects() {
            const container = document.getElementById('fav-subjects');
            const favSubjects = currentUser.preferences?.favoriteSubjects || [];
            container.innerHTML = '';
            subjects.forEach(sub => {
                const label = document.createElement('label');
                label.innerHTML = `<input type="checkbox" value="${sub.id}" ${favSubjects.includes(sub.id) ? 'checked' : ''}> ${sub.name}`;
                container.appendChild(label);
            });
        }

        // عرض قائمة المفضلة
        function renderFavorites() {
            const container = document.getElementById('favorites-list');
            const favorites = currentUser.stats?.favoriteBooks || [];
            container.innerHTML = '';
            if (favorites.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted);">لا توجد كتب مفضلة بعد</p>';
                return;
            }
            favorites.forEach((book, index) => {
                const item = document.createElement('div');
                item.className = 'book-list-item';
                item.innerHTML = `
                    <img src="${book.image}" alt="${book.title}">
                    <div class="info">
                        <h4>${book.title}</h4>
                        <p>${book.author}</p>
                    </div>
                    <button class="remove-fav" onclick="removeFavorite(${index})"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(item);
            });
        }

        // إزالة من المفضلة
        window.removeFavorite = function(index) {
            currentUser.stats.favoriteBooks.splice(index, 1);
            updateCurrentUser(currentUser);
            renderFavorites();
            document.getElementById('stat-fav').innerText = currentUser.stats.favoriteBooks.length;
        };

        // عرض آخر الكتب المقروءة
        function renderRecent() {
            const container = document.getElementById('recent-list');
            const recent = currentUser.stats?.recentlyViewed || [];
            container.innerHTML = '';
            if (recent.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted);">لم تقرأ أي كتاب بعد</p>';
                return;
            }
            recent.forEach(book => {
                const item = document.createElement('div');
                item.className = 'book-list-item';
                item.innerHTML = `
                    <img src="${book.image}" alt="${book.title}">
                    <div class="info">
                        <h4>${book.title}</h4>
                        <p>${book.author}</p>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // عرض الكتب قيد القراءة (حالياً فارغة)
        function renderCurrent() {
            const container = document.getElementById('current-list');
            const current = currentUser.stats?.currentlyReading || [];
            container.innerHTML = '';
            if (current.length === 0) {
                container.innerHTML = '<p style="color: var(--text-muted);">لا توجد كتب قيد القراءة</p>';
                return;
            }
            // مشابه للمفضلة لكن بدون زر حذف
        }

        // تحميل الإعدادات إلى النموذج
        function loadPreferences() {
            const prefs = currentUser.preferences || {};
            document.getElementById('font-size').value = prefs.fontSize || 'medium';
            document.getElementById('dark-mode').value = prefs.darkMode ? 'true' : 'false';
            document.getElementById('reading-goal').value = prefs.readingGoal || 0;
            document.getElementById('goal-value').innerText = prefs.readingGoal || 0;
        }

        // تحديث قيمة الهدف
        document.getElementById('reading-goal').addEventListener('input', (e) => {
            document.getElementById('goal-value').innerText = e.target.value;
        });

        // حفظ التفضيلات
        document.getElementById('preferences-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // جمع التصنيفات المختارة
            const favSubjects = [];
            document.querySelectorAll('#fav-subjects input:checked').forEach(cb => {
                favSubjects.push(cb.value);
            });

            currentUser.preferences = {
                favoriteSubjects: favSubjects,
                fontSize: document.getElementById('font-size').value,
                darkMode: document.getElementById('dark-mode').value === 'true',
                readingGoal: parseInt(document.getElementById('reading-goal').value)
            };
            
            updateCurrentUser(currentUser);
            alert('تم حفظ التفضيلات بنجاح');
        });

        // تهيئة الصفحة
        renderProfile();
        renderFavoriteSubjects();
        renderFavorites();
        renderRecent();
        renderCurrent();
        loadPreferences();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة العامة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- شريط المستخدم العلوي -->
    <div id="user-bar">
        <div id="user-info" style="display: none;">
            <span id="welcome-message"></span>
            <div class="user-dropdown">
                <img src="https://via.placeholder.com/32x32?text=User" alt="User" id="user-avatar">
                <div class="dropdown-content">
                    <a href="profile.html"><i class="fas fa-user"></i> ملفي الشخصي</a>
                    <a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</a>
                </div>
            </div>
        </div>
        <div id="guest-links">
            <a href="login.html" class="btn-login"><i class="fas fa-sign-in-alt"></i> دخول</a>
            <a href="login.html?signup=true" class="btn-signup"><i class="fas fa-user-plus"></i> إنشاء حساب</a>
        </div>
    </div>

    <button id="menu-btn"><i class="fas fa-bars"></i></button>

    <aside id="sidebar">
        <h1><i class="fas fa-book-open"></i> المكتبة العامة</h1>
        <div id="subjects-list"></div>
    </aside>

    <main>
        <header>
            <input type="text" id="search" placeholder="ابحث عن كتاب أو مؤلف...">
            <h2 id="subject-title">الكل</h2>
        </header>
        <section id="books"></section>
    </main>

    <!-- زر المشرف (يظهر فقط للمشرف) -->
    <button id="admin-btn" onclick="location.href='admin.html'" style="display: none;">
        <i class="fas fa-user-shield"></i>
    </button>

    <script src="script.js"></script>
</body>
</html>
